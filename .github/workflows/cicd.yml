name: CI/CD Study Planner
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: study_planner
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: lakshmi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt pytest
        
    - name: Run tests
      run: pytest test_app.py -v
      
    - name: Build Docker
      run: docker build -t study-planner .
