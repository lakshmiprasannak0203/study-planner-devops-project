version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: study_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lakshmi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: study_planner
      DB_USER: postgres
      DB_PASS: lakshmi
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
